<svg xmlns="http://www.w3.org/2000/svg" width="390" height="780" viewBox="0 0 390 780">
  <!-- Phone frame -->
  <rect width="390" height="780" rx="36" fill="#1a1a2e"/>
  
  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" rx="36" fill="#12122a"/>
  <text x="30" y="28" font-family="sans-serif" font-size="13" fill="#e0e0e0">9:41</text>
  <text x="340" y="28" font-family="sans-serif" font-size="12" fill="#e0e0e0">⚡</text>

  <!-- App bar -->
  <rect x="0" y="44" width="390" height="56" fill="#1e1e3a"/>
  <text x="20" y="80" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">IoT Dashboard</text>
  <circle cx="350" cy="72" r="10" fill="#4CAF50"/>
  <text x="342" y="77" font-family="sans-serif" font-size="12" fill="#fff">✓</text>

  <!-- Gauge Widget -->
  <rect x="12" y="112" width="175" height="160" rx="12" fill="#252545"/>
  <text x="99" y="134" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">Temperature</text>
  <!-- Gauge arc -->
  <path d="M 50 190 A 50 50 0 0 1 150 190" stroke="#333360" stroke-width="10" fill="none"/>
  <path d="M 50 190 A 50 50 0 0 1 117 148" stroke="#FF5722" stroke-width="10" fill="none"/>
  <circle cx="99" cy="190" r="4" fill="#FF5722"/>
  <text x="99" y="220" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FF5722" text-anchor="middle">24.3°C</text>
  <text x="99" y="238" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Min: 18.1 · Max: 31.2</text>
  <rect x="12" y="112" width="175" height="160" rx="12" fill="none" stroke="#3a3a6a" stroke-width="1"/>

  <!-- Chart Widget -->
  <rect x="201" y="112" width="177" height="160" rx="12" fill="#252545"/>
  <text x="289" y="134" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">Humidity</text>
  <!-- Chart lines -->
  <polyline points="218,220 238,200 258,210 278,185 298,195 318,175 358,180" stroke="#2196F3" stroke-width="2" fill="none"/>
  <rect x="218" y="145" width="140" height="80" fill="none" stroke="#3a3a6a" stroke-width="0.5"/>
  <line x1="218" y1="165" x2="358" y2="165" stroke="#3a3a6a" stroke-width="0.5"/>
  <line x1="218" y1="185" x2="358" y2="185" stroke="#3a3a6a" stroke-width="0.5"/>
  <line x1="218" y1="205" x2="358" y2="205" stroke="#3a3a6a" stroke-width="0.5"/>
  <text x="289" y="248" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2196F3" text-anchor="middle">67%</text>
  <rect x="201" y="112" width="177" height="160" rx="12" fill="none" stroke="#3a3a6a" stroke-width="1"/>

  <!-- Value Widget -->
  <rect x="12" y="284" width="175" height="120" rx="12" fill="#252545"/>
  <text x="99" y="306" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">Pressure</text>
  <text x="99" y="345" font-family="sans-serif" font-size="28" font-weight="bold" fill="#9C27B0" text-anchor="middle">1013</text>
  <text x="99" y="365" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">hPa</text>
  <text x="99" y="390" font-family="sans-serif" font-size="9" fill="#6060aa" text-anchor="middle">avg: 1012 · σ 2.1</text>
  <rect x="12" y="284" width="175" height="120" rx="12" fill="none" stroke="#3a3a6a" stroke-width="1"/>

  <!-- Toggle Widget -->
  <rect x="201" y="284" width="177" height="120" rx="12" fill="#252545"/>
  <text x="289" y="306" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">LED Control</text>
  <text x="289" y="350" font-family="sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">GPIO 13</text>
  <!-- Toggle switch ON -->
  <rect x="249" y="360" width="80" height="30" rx="15" fill="#4CAF50"/>
  <circle cx="313" cy="375" r="12" fill="#ffffff"/>
  <text x="265" y="378" font-family="sans-serif" font-size="11" fill="#fff">ON</text>
  <rect x="201" y="284" width="177" height="120" rx="12" fill="none" stroke="#3a3a6a" stroke-width="1"/>

  <!-- Status Widget -->
  <rect x="12" y="416" width="366" height="90" rx="12" fill="#252545"/>
  <text x="30" y="438" font-family="sans-serif" font-size="11" fill="#9090bb">System Status</text>
  <circle cx="38" cy="460" r="6" fill="#4CAF50"/>
  <text x="52" y="465" font-family="sans-serif" font-size="12" fill="#e0e0e0">BLE Connected · ESP32-IoT-Device</text>
  <text x="30" y="488" font-family="sans-serif" font-size="10" fill="#6060aa">Uptime: 2h 14m · Buffer: 0% · Last sync: just now</text>
  <rect x="12" y="416" width="366" height="90" rx="12" fill="none" stroke="#3a3a6a" stroke-width="1"/>

  <!-- FAB -->
  <rect x="283" y="519" width="95" height="40" rx="20" fill="#FF5722"/>
  <text x="330" y="545" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">+ Widget</text>

  <!-- Bottom navigation -->
  <rect x="0" y="700" width="390" height="80" fill="#1e1e3a"/>
  <line x1="0" y1="700" x2="390" y2="700" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Dashboard (active) -->
  <rect x="0" y="700" width="97" height="80" fill="#1e1e3a"/>
  <text x="48" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#FF5722">⊞</text>
  <text x="48" y="748" font-family="sans-serif" font-size="10" fill="#FF5722" text-anchor="middle">Dashboard</text>
  <!-- Devices -->
  <text x="145" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⬡</text>
  <text x="145" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Devices</text>
  <!-- Data Log -->
  <text x="245" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">≡</text>
  <text x="245" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Data Log</text>
  <!-- Settings -->
  <text x="342" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⚙</text>
  <text x="342" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Settings</text>
</svg>

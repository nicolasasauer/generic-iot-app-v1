<svg xmlns="http://www.w3.org/2000/svg" width="390" height="780" viewBox="0 0 390 780">
  <!-- Phone frame -->
  <rect width="390" height="780" rx="36" fill="#1a1a2e"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" rx="36" fill="#12122a"/>
  <text x="30" y="28" font-family="sans-serif" font-size="13" fill="#e0e0e0">9:41</text>

  <!-- App bar -->
  <rect x="0" y="44" width="390" height="56" fill="#1e1e3a"/>
  <text x="20" y="80" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">IoT Dashboard</text>

  <!-- Section: Connected Device -->
  <text x="20" y="124" font-family="sans-serif" font-size="12" font-weight="bold" fill="#9090bb">CONNECTED DEVICE</text>
  <rect x="12" y="132" width="366" height="64" rx="10" fill="#252545"/>
  <circle cx="36" cy="164" r="12" fill="#1e3a1e"/>
  <text x="36" y="170" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#4CAF50">⬡</text>
  <text x="58" y="156" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">ESP32-IoT-Device</text>
  <text x="58" y="173" font-family="sans-serif" font-size="11" fill="#9090bb">AA:BB:CC:DD:EE:01</text>
  <rect x="310" y="150" width="58" height="28" rx="14" fill="#3a1e1e"/>
  <text x="339" y="169" font-family="sans-serif" font-size="11" fill="#FF5722" text-anchor="middle">Disconnect</text>

  <!-- Section: Sensors -->
  <text x="20" y="218" font-family="sans-serif" font-size="12" font-weight="bold" fill="#9090bb">SENSOR CONFIGURATION</text>

  <!-- Sensor row 1 -->
  <rect x="12" y="226" width="366" height="56" rx="10" fill="#252545"/>
  <text x="30" y="246" font-family="sans-serif" font-size="13" fill="#ffffff">Temperature</text>
  <text x="30" y="263" font-family="sans-serif" font-size="10" fill="#9090bb">I2C · 0x48 · 1000 ms interval</text>
  <rect x="330" y="234" width="36" height="22" rx="11" fill="#4CAF50"/>
  <circle cx="354" cy="245" r="9" fill="#ffffff"/>

  <!-- Sensor row 2 -->
  <rect x="12" y="294" width="366" height="56" rx="10" fill="#252545"/>
  <text x="30" y="314" font-family="sans-serif" font-size="13" fill="#ffffff">Humidity</text>
  <text x="30" y="331" font-family="sans-serif" font-size="10" fill="#9090bb">I2C · 0x48 · 1000 ms interval</text>
  <rect x="330" y="302" width="36" height="22" rx="11" fill="#4CAF50"/>
  <circle cx="354" cy="313" r="9" fill="#ffffff"/>

  <!-- Sensor row 3 -->
  <rect x="12" y="362" width="366" height="56" rx="10" fill="#252545"/>
  <text x="30" y="382" font-family="sans-serif" font-size="13" fill="#ffffff">Pressure</text>
  <text x="30" y="399" font-family="sans-serif" font-size="10" fill="#9090bb">SPI · CS 5 · 2000 ms interval</text>
  <rect x="330" y="370" width="36" height="22" rx="11" fill="#4CAF50"/>
  <circle cx="354" cy="381" r="9" fill="#ffffff"/>

  <!-- Sensor row 4 -->
  <rect x="12" y="430" width="366" height="56" rx="10" fill="#252545"/>
  <text x="30" y="450" font-family="sans-serif" font-size="13" fill="#ffffff">Analog Input</text>
  <text x="30" y="467" font-family="sans-serif" font-size="10" fill="#9090bb">ADC · GPIO 34 · 500 ms interval</text>
  <rect x="330" y="438" width="36" height="22" rx="11" fill="#333360"/>
  <circle cx="341" cy="449" r="9" fill="#ffffff"/>

  <!-- Section: Appearance -->
  <text x="20" y="510" font-family="sans-serif" font-size="12" font-weight="bold" fill="#9090bb">APP SETTINGS</text>
  <rect x="12" y="518" width="366" height="48" rx="10" fill="#252545"/>
  <text x="30" y="540" font-family="sans-serif" font-size="13" fill="#ffffff">Dark Theme</text>
  <text x="30" y="557" font-family="sans-serif" font-size="10" fill="#9090bb">Material 3 · Always on</text>
  <rect x="330" y="526" width="36" height="22" rx="11" fill="#4CAF50"/>
  <circle cx="354" cy="537" r="9" fill="#ffffff"/>

  <rect x="12" y="578" width="366" height="48" rx="10" fill="#252545"/>
  <text x="30" y="600" font-family="sans-serif" font-size="13" fill="#ffffff">Buffer Size</text>
  <text x="30" y="617" font-family="sans-serif" font-size="10" fill="#9090bb">10,000 entries per sensor</text>
  <text x="350" y="606" font-family="sans-serif" font-size="14" fill="#9090bb" text-anchor="middle">›</text>

  <!-- Bottom navigation -->
  <rect x="0" y="700" width="390" height="80" fill="#1e1e3a"/>
  <line x1="0" y1="700" x2="390" y2="700" stroke="#2a2a4a" stroke-width="1"/>
  <text x="48" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⊞</text>
  <text x="48" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Dashboard</text>
  <text x="145" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⬡</text>
  <text x="145" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Devices</text>
  <text x="245" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">≡</text>
  <text x="245" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Data Log</text>
  <text x="342" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#FF5722">⚙</text>
  <text x="342" y="748" font-family="sans-serif" font-size="10" fill="#FF5722" text-anchor="middle">Settings</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="390" height="780" viewBox="0 0 390 780">
  <!-- Phone frame -->
  <rect width="390" height="780" rx="36" fill="#1a1a2e"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" rx="36" fill="#12122a"/>
  <text x="30" y="28" font-family="sans-serif" font-size="13" fill="#e0e0e0">9:41</text>

  <!-- App bar -->
  <rect x="0" y="44" width="390" height="56" fill="#1e1e3a"/>
  <text x="20" y="80" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">IoT Dashboard</text>
  <circle cx="350" cy="72" r="10" fill="#9E9E9E"/>
  <text x="342" y="77" font-family="sans-serif" font-size="12" fill="#fff">·</text>

  <!-- Scan header -->
  <rect x="12" y="112" width="366" height="56" rx="12" fill="#252545"/>
  <text x="194" y="138" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Scanning for BLE devices…</text>
  <text x="194" y="156" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">Tap a device to connect</text>

  <!-- Scanning animation dots -->
  <circle cx="174" cy="183" r="6" fill="#2196F3" opacity="1.0"/>
  <circle cx="194" cy="183" r="6" fill="#2196F3" opacity="0.6"/>
  <circle cx="214" cy="183" r="6" fill="#2196F3" opacity="0.3"/>

  <!-- Device list -->
  <!-- Device 1 - ESP32 -->
  <rect x="12" y="204" width="366" height="72" rx="12" fill="#252545"/>
  <rect x="12" y="204" width="366" height="72" rx="12" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="44" cy="240" r="14" fill="#1e3a1e"/>
  <text x="44" y="246" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#4CAF50">⬡</text>
  <text x="68" y="232" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">ESP32-IoT-Device</text>
  <text x="68" y="250" font-family="sans-serif" font-size="11" fill="#9090bb">RSSI: -48 dBm · Connectable</text>
  <text x="68" y="266" font-family="sans-serif" font-size="10" fill="#6060aa">AA:BB:CC:DD:EE:01 · Nordic UART Service</text>
  <rect x="318" y="222" width="48" height="28" rx="14" fill="#4CAF50"/>
  <text x="341" y="241" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">CONNECT</text>

  <!-- Device 2 -->
  <rect x="12" y="288" width="366" height="72" rx="12" fill="#252545"/>
  <circle cx="44" cy="324" r="14" fill="#1e2a3a"/>
  <text x="44" y="330" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#2196F3">⬡</text>
  <text x="68" y="316" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">ESP32-Sensor-02</text>
  <text x="68" y="334" font-family="sans-serif" font-size="11" fill="#9090bb">RSSI: -67 dBm · Connectable</text>
  <text x="68" y="350" font-family="sans-serif" font-size="10" fill="#6060aa">AA:BB:CC:DD:EE:02</text>
  <rect x="318" y="306" width="48" height="28" rx="14" fill="#2a2a5a"/>
  <text x="341" y="325" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">CONNECT</text>

  <!-- Device 3 -->
  <rect x="12" y="372" width="366" height="72" rx="12" fill="#252545"/>
  <circle cx="44" cy="408" r="14" fill="#2a1e3a"/>
  <text x="44" y="414" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#9C27B0">⬡</text>
  <text x="68" y="400" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Unknown Device</text>
  <text x="68" y="418" font-family="sans-serif" font-size="11" fill="#9090bb">RSSI: -82 dBm · Connectable</text>
  <text x="68" y="434" font-family="sans-serif" font-size="10" fill="#6060aa">FF:EE:DD:CC:BB:A0</text>
  <rect x="318" y="390" width="48" height="28" rx="14" fill="#2a2a5a"/>
  <text x="341" y="409" font-family="sans-serif" font-size="11" fill="#9090bb" text-anchor="middle">CONNECT</text>

  <!-- Stop scan button -->
  <rect x="100" y="470" width="190" height="44" rx="22" fill="#FF5722"/>
  <text x="194" y="498" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">■ Stop Scan</text>

  <!-- Bottom navigation -->
  <rect x="0" y="700" width="390" height="80" fill="#1e1e3a"/>
  <line x1="0" y1="700" x2="390" y2="700" stroke="#2a2a4a" stroke-width="1"/>
  <text x="48" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⊞</text>
  <text x="48" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Dashboard</text>
  <text x="145" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#2196F3">⬡</text>
  <text x="145" y="748" font-family="sans-serif" font-size="10" fill="#2196F3" text-anchor="middle">Devices</text>
  <text x="245" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">≡</text>
  <text x="245" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Data Log</text>
  <text x="342" y="728" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#6060aa">⚙</text>
  <text x="342" y="748" font-family="sans-serif" font-size="10" fill="#6060aa" text-anchor="middle">Settings</text>
</svg>

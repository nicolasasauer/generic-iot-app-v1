  <rect x="12" y="390" width="366" height="38" fill="#22223f"/>
  <text x="22" y="404" font-family="sans-serif" font-size="10" fill="#9090bb">09:41:18</text>
  <text x="100" y="404" font-family="sans-serif" font-size="11" fill="#FF5722">Temperature</text>
  <text x="220" y="404" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">24.1</text>

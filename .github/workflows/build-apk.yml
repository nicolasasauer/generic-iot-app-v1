name: Build Android APK (Galaxy S23)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: iot_app
        run: flutter pub get

      - name: Generate code (freezed / json_serializable)
        working-directory: iot_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > iot_app/android/local.properties

      - name: Build release APK for ARM64 (Galaxy S23)
        working-directory: iot_app
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-app-arm64-release
          path: iot_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Wir bleiben bei 7.4.2 für maximale Kompatibilität
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

// Dieser Teil ist absolut kritisch für flutter_blue_plus:
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                // Falls das Plugin kein Namespace hat (neue Gradle-Pflicht)
                if (namespace == null) {
                    namespace project.group
                }
                // Hier zwingen wir die Versionen rein:
                compileSdkVersion 34
                buildToolsVersion "34.0.0"

                defaultConfig {
                    minSdkVersion 21
                    targetSdkVersion 34
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

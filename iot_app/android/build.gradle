buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Wir nutzen 7.4.2, da 8.1.0 (wie wir gesehen haben) zu neu ist
        // und 7.3.0 manchmal Probleme mit Flutter 3.24 hat.
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

// WICHTIG: Die Zeilen mit 'evaluationDependsOn(":app")' MÜSSEN WEG.
// Sie verursachen oft den "null object" Fehler bei Plugins.

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// Dieser Block erzwingt die Versionen für alle Plugins (inkl. flutter_blue_plus)
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
                compileSdkVersion 34
                buildToolsVersion "34.0.0"

                defaultConfig {
                    minSdkVersion 21
                    targetSdkVersion 34
                }
            }
        }
    }
}
